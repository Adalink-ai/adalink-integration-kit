name: Release

on:
  push:
    branches: [main]

concurrency: release

permissions:
  contents: write # tags de release + commits do PR de versão
  pull-requests: write # abrir/atualizar o PR "Version Packages"
  id-token: write # provenance do npm

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r typecheck

      - run: pnpm -r test

      - run: pnpm -r build

      # Com changesets pendentes: abre/atualiza o PR "Version Packages".
      # Sem pendências (merge do PR de versão): publica os pacotes alterados.
      - uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
